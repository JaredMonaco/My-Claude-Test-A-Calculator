<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galactic Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap');

    * { box-sizing: border-box; }

    body {
      font-family: 'Orbitron', sans-serif;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    /* Starfield */
    .stars, .stars2, .stars3 {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .stars  { background: radial-gradient(1px 1px at 20px 30px, #fff, transparent),
                          radial-gradient(1px 1px at 90px 80px, #fff, transparent),
                          radial-gradient(1px 1px at 160px 120px, #fff, transparent),
                          radial-gradient(2px 2px at 230px 50px, #fff, transparent),
                          radial-gradient(1px 1px at 300px 180px, #fff, transparent);
              background-repeat: repeat;
              background-size: 350px 350px;
              animation: drift 120s linear infinite; opacity: 0.8; }
    .stars2 { background: radial-gradient(1px 1px at 50px 160px, #cfe8ff, transparent),
                          radial-gradient(1px 1px at 130px 40px, #cfe8ff, transparent),
                          radial-gradient(1px 1px at 210px 200px, #cfe8ff, transparent);
              background-repeat: repeat;
              background-size: 250px 250px;
              animation: drift 80s linear infinite; opacity: 0.5; }
    .stars3 { background: radial-gradient(2px 2px at 80px 90px, #ffe9a8, transparent),
                          radial-gradient(1px 1px at 180px 220px, #ffe9a8, transparent);
              background-repeat: repeat;
              background-size: 400px 400px;
              animation: drift 200s linear infinite; opacity: 0.6; }
    @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-350px); } }

    .calculator {
      position: relative;
      z-index: 2;
      background: linear-gradient(160deg, #11151c, #05070a);
      padding: 24px;
      border-radius: 14px;
      border: 1px solid #2b3a4a;
      box-shadow: 0 0 40px rgba(0, 170, 255, 0.15), inset 0 0 20px rgba(0, 0, 0, 0.6);
      width: 300px;
    }

    .title {
      text-align: center;
      color: #ffe81f;
      font-weight: 900;
      letter-spacing: 3px;
      font-size: 18px;
      margin-bottom: 16px;
      text-shadow: 0 0 12px rgba(255, 232, 31, 0.6);
    }

    .display {
      width: 100%;
      height: 66px;
      font-family: 'Orbitron', sans-serif;
      font-size: 30px;
      font-weight: 700;
      text-align: right;
      border: 1px solid #1c4a5a;
      background: #02141a;
      color: #2ff3ff;
      border-radius: 8px;
      padding: 0 16px;
      margin-bottom: 16px;
      text-shadow: 0 0 10px rgba(47, 243, 255, 0.7);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 56px;
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
      border: 1px solid #34465a;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(180deg, #1b2430, #10161e);
      color: #cfe8ff;
      transition: all 0.12s ease;
    }
    button:hover { border-color: #2ff3ff; box-shadow: 0 0 12px rgba(47, 243, 255, 0.5); }
    button:active { transform: translateY(1px); }

    /* Blue lightsaber operators */
    .op {
      color: #6fdcff;
      border-color: #2ff3ff;
      text-shadow: 0 0 8px rgba(47, 243, 255, 0.8);
    }
    .op:hover { box-shadow: 0 0 16px rgba(47, 243, 255, 0.8); }

    /* Green lightsaber equals */
    .equals {
      color: #7CFC00;
      border-color: #7CFC00;
      text-shadow: 0 0 8px rgba(124, 252, 0, 0.8);
    }
    .equals:hover { box-shadow: 0 0 16px rgba(124, 252, 0, 0.8); }

    /* Red lightsaber clear */
    .clear {
      color: #ff4b4b;
      border-color: #ff3b30;
      text-shadow: 0 0 8px rgba(255, 75, 75, 0.8);
    }
    .clear:hover { box-shadow: 0 0 16px rgba(255, 75, 75, 0.8); }

    .span-two { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>

  <div class="calculator">
    <div class="title">GALACTIC CALCULATOR</div>
    <input type="text" class="display" id="display" value="0" readonly />
    <div class="buttons">
      <button class="clear span-two" onclick="clearAll()">C</button>
      <button class="op" onclick="chooseOp('/')">÷</button>
      <button class="op" onclick="chooseOp('*')">×</button>

      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button class="op" onclick="chooseOp('-')">−</button>

      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button class="op" onclick="chooseOp('+')">+</button>

      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button class="equals" onclick="calculate()">=</button>

      <button class="span-two" onclick="appendNumber('0')">0</button>
      <button onclick="appendNumber('.')">.</button>
      <button onclick="backspace()">⌫</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = null;
    let operator = null;
    let resetNext = false;

    const display = document.getElementById('display');

    function updateDisplay() {
      display.value = current;
    }

    function appendNumber(num) {
      if (resetNext) {
        current = '0';
        resetNext = false;
      }
      if (num === '.' && current.includes('.')) return;
      if (current === '0' && num !== '.') {
        current = num;
      } else {
        current += num;
      }
      updateDisplay();
    }

    function chooseOp(op) {
      if (operator !== null && !resetNext) calculate();
      previous = current;
      operator = op;
      resetNext = true;
    }

    function calculate() {
      if (operator === null || previous === null) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      let result;
      switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/':
          result = b === 0 ? 'Error' : a / b;
          break;
      }
      current = String(result);
      operator = null;
      previous = null;
      resetNext = true;
      updateDisplay();
    }

    function clearAll() {
      current = '0';
      previous = null;
      operator = null;
      resetNext = false;
      updateDisplay();
    }

    function backspace() {
      if (resetNext) return;
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }
  </script>
</body>
</html>
